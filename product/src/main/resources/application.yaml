spring:
  application:
    name: product

  datasource:
    url: jdbc:postgresql://localhost:5432/productdb
    username: postgres
    password: AdminPassword
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create
    show-sql: true

  # Redis Configuration
  redis:
    host: localhost
    port: 6379
    password:              # leave empty if no password set locally
    timeout: 2000ms        # connection timeout

    # Cache Configuration
    cache:
      type: redis
      redis:
        time-to-live: 600000        # 10 minutes in milliseconds
        cache-null-values: false    # don't cache null results


server:
  port: 8083

jwt:
  secret: mdGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCBhdXRoZW50aWNhdGlvbg==
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

services:
  product:
    internal-token: change-me-product-order-token
