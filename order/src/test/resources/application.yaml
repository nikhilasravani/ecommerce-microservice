spring:
  datasource:
    url: jdbc:h2:mem:ordertestdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
    consumer:
      group-id: order-service-test
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.microservices.ecommerce.order.dto.PaymentResultEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

services:
  order:
    internal-token: test-order-token
  cart:
    internal-token: test-cart-token
  product:
    internal-token: test-product-token

jwt:
  secret: dGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0LXNlY3JldA==

kafka:
  topic:
    order-placed: order-placed
    payment-result: payment-result

eureka:
  client:
    enabled: false
