server :
  port : 8084

spring:
  application:
    name: gateway

  cloud :
    gateway:
      server:
        webmvc :
          routes:
            - id : user-get-all-route
              uri : http://localhost:8081
              predicates :
                - Path=/users/getAllUsers
                - Method=GET

            - id : user-get-by-id-route
              uri : http://localhost:8081
              predicates :
                - Path=/users/getUserById/**
                - Method=GET

            - id : user-make-admin-route
              uri : http://localhost:8081
              predicates :
                - Path=/users/*/make-admin
                - Method=PUT

            - id : authentication-service
              uri : http://localhost:8082
              predicates :
                - Path=/auth/**
                - Method=POST
              filters:
#                - StripPrefix=1
                - AddRequestHeader=X-Gateway-Source, gateway

            - id : product-service-find-product
              uri : http://localhost:8083
              predicates :
                - Path=/products/**
                - Method=GET

            - id: product-service-add-product
              uri: http://localhost:8083
              predicates:
                - Path=/products/**
                - Method=POST

            - id: product-service-update-product
              uri: http://localhost:8083
              predicates:
                - Path=/products/**
                - Method=PUT

            - id: product-service-delete-product
              uri: http://localhost:8083
              predicates:
                - Path=/products/**
                - Method=DELETE

logging:
  level :
    root : info
    org.springframework.cloud.gateway.RouteDefinitionLocator: INFO
    org.springframework.cloud.gateway : TRACE

jwt:
  secret: mdGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCBhdXRoZW50aWNhdGlvbg==
