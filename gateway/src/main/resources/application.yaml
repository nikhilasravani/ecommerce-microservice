server :
  port : 8084

spring:
  application:
    name: gateway

  cloud :
    gateway:
      server:
        webmvc :
          routes:
            - id : user-get-all-route
              uri : lb://user
              predicates :
                - Path=/users/getAllUsers
                - Method=GET

            - id : user-get-by-id-route
              uri : lb://user
              predicates :
                - Path=/users/getUserById/**
                - Method=GET

            - id : user-make-admin-route
              uri : lb://user
              predicates :
                - Path=/users/*/make-admin
                - Method=PUT

            - id : authentication-service
              uri : lb://authentication
              predicates :
                - Path=/auth/**
                - Method=POST
              filters:
#                - StripPrefix=1
                - AddRequestHeader=X-Gateway-Source, gateway

            - id : product-service-find-product
              uri : lb://product
              predicates :
                - Path=/products/**
                - Method=GET

            - id: product-service-add-product
              uri: lb://product
              predicates:
                - Path=/products/**
                - Method=POST

            - id: product-service-update-product
              uri: lb://product
              predicates:
                - Path=/products/**
                - Method=PUT

            - id: product-service-delete-product
              uri: lb://product
              predicates:
                - Path=/products/**
                - Method=DELETE

logging:
  level :
    root : info
    org.springframework.cloud.gateway.RouteDefinitionLocator: INFO
    org.springframework.cloud.gateway : TRACE

jwt:
  secret: mdGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCBhdXRoZW50aWNhdGlvbg==

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

